name: redactgate

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: redactgate
      POSTGRES_PASSWORD: redactgate
      POSTGRES_DB: redactgate
    ports:
      - "5455:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redactgate"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6390:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Optional local model runtime for fully air-gapped mode (AI_PROVIDER=ollama).
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11436:11434"
    volumes:
      - ollamadata:/root/.ollama

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://redactgate:redactgate@postgres:5432/redactgate
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8088:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["arq", "app.worker.WorkerSettings"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://redactgate:redactgate@postgres:5432/redactgate
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    profiles: ["web"]
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8088
      REDACTGATE_API_BASE: http://api:8000
    ports:
      - "3088:3000"
    depends_on:
      - api

volumes:
  pgdata:
  ollamadata:
