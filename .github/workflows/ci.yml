name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Unit tests (no DB)
        run: pytest -q

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: redactgate
          POSTGRES_PASSWORD: redactgate
          POSTGRES_DB: redactgate
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U redactgate"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      RUN_INTEGRATION: "1"
      DATABASE_URL: postgresql+asyncpg://redactgate:redactgate@localhost:5432/redactgate
      VAULT_MASTER_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      FINGERPRINT_HMAC_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      AUDIT_HMAC_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Integration tests
        run: pytest -q -m integration
